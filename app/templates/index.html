{% extends "base.html" %}
{% block content %}
<section class="panel form-panel">
    <h2>Create Premium Plan</h2>
    <form id="plan-form" class="grid">
        <label>
            City
            <input name="city" required placeholder="Paris" />
        </label>
        <label>
            Check-in
            <input type="date" name="check_in" required />
        </label>
        <label>
            Check-out
            <input type="date" name="check_out" required />
        </label>
        <label>
            Adults
            <input type="number" name="adults" min="1" max="10" value="2" required />
        </label>
        <label>
            Budget Amount
            <input type="number" name="budget_amount" min="0" step="100" value="50000" required />
        </label>
        <label>
            Budget Currency
            <input name="budget_currency" maxlength="3" value="INR" required />
        </label>
        <label class="full">
            Style
            <select name="style">
                <option value="balanced">Balanced</option>
                <option value="luxury">Luxury</option>
                <option value="foodie">Foodie</option>
                <option value="culture">Culture</option>
            </select>
        </label>
        <button type="submit" id="submit-btn">Generate Plan</button>
    </form>
</section>

<section id="result" class="panel hidden">
    <h2>Your Plan Output</h2>
    <div id="result-meta" class="meta"></div>
    <article id="result-content" class="markdown"></article>
</section>
{% endblock %}
